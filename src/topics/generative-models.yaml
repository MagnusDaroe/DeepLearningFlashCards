id: generative-models
title: Generative Models
questions:
  - id: q1
    question: What is the fundamental goal of a generative model, and why is it considered a density estimation problem?
    answer: >
      A generative model aims to learn a distribution p_model(x) that approximates
      the true data distribution p_data(x), so that new samples can be drawn from it.
      It is a density estimation problem because the model must learn the underlying
      probability distribution of the training data without explicit labels —
      a core challenge in unsupervised learning.

  - id: q2
    question: What is autoregressive generation, and how does it factorize the joint distribution of a sequence?
    answer: >
      Autoregressive generation models each element in a sequence conditioned on
      all previous elements. The joint probability is factorized using the chain rule:
      P(x) = ∏ P(x_m | x_1, ..., x_{m-1}). Each token is generated one at a time,
      making the process sequential and tractable but slow.

  - id: q3
    question: Why are autoregressive models considered tractable density models, while latent variable models like VAEs are not?
    answer: >
      Autoregressive models explicitly factorize the joint distribution using the
      chain rule, making the likelihood computable exactly at every step.
      Latent variable models like VAEs introduce a latent variable z and require
      integrating over all possible z values — p(x) = ∫ p(z)p(x|z)dz — which is
      analytically intractable due to the high-dimensional latent space and
      nonlinear decoder mappings.

  - id: q4
    question: What is the difference between a standard autoencoder and a variational autoencoder in terms of their latent representation?
    answer: >
      A standard autoencoder maps each input to a single deterministic point in
      latent space, meaning there is no guaranteed structure and random sampling
      produces meaningless outputs. A VAE instead maps each input to a probability
      distribution (mean and variance), forcing the latent space to be continuous
      and structured, which enables meaningful generation by sampling from the prior.

  - id: q5
    question: What is the role of KL divergence in the VAE training objective, and what does it regularize?
    answer: >
      The KL divergence term D_KL(q_φ(z|x) || p_θ(z)) measures how far the
      encoder's output distribution is from the prior N(0,I). It acts as a
      regularizer that prevents the encoder from mapping inputs to arbitrary
      distributions, keeping the latent space smooth and continuous. This ensures
      that randomly sampled points from the prior decode into meaningful outputs.

  - id: q6
    question: What is the Evidence Lower Bound (ELBO), and why do VAEs optimize it instead of the true likelihood?
    answer: >
      The ELBO is a tractable lower bound on the true log-likelihood:
      log p_θ(x) ≥ E_z[log p_θ(x|z)] - D_KL(q_φ(z|x) || p_θ(z)).
      The true likelihood is intractable because it requires computing the
      intractable posterior p_θ(z|x). Since KL divergence is always ≥ 0,
      the ELBO is always a valid lower bound, and maximizing it pushes both
      the true likelihood up and the approximate posterior closer to the true posterior.

  - id: q7
    question: What are the two competing terms in the ELBO, and what tension exists between them during training?
    answer: >
      The reconstruction term E_z[log p_θ(x|z)] encourages the decoder to
      accurately reproduce the input, pushing the encoder to encode inputs
      precisely. The KL term penalizes the encoder for deviating from the
      prior N(0,I), forcing the latent distribution to remain structured.
      These two terms are in tension — better reconstruction often requires
      more specific encodings, while the KL term pulls encodings back toward
      a simple Gaussian.

  - id: q8
    question: Why do VAEs tend to produce blurry outputs compared to GANs?
    answer: >
      VAEs optimize a pixel-level reconstruction loss, which averages over the
      uncertainty in the decoder's output distribution. This averaging effect
      causes the model to spread probability mass conservatively across likely
      pixel values, resulting in blurry images. GANs instead use a discriminative
      loss that judges realism, pushing the generator toward sharp, high-frequency
      details rather than safe averages.

  - id: q9
    question: What is the role of the discriminator in a GAN, and what is it trained to do?
    answer: >
      The discriminator D is a binary classifier trained to distinguish real data
      from generated (fake) data. It is trained to maximize the probability of
      correctly classifying real samples as real — D(x) near 1 — and fake samples
      as fake — D(G(z)) near 0. It provides the learning signal for the generator
      by evaluating the realism of generated samples.

  - id: q10
    question: What is the minimax objective in GAN training, and what does each player optimize?
    answer: >
      The minimax objective is min_G max_D V(D,G) = E[log D(x)] + E[log(1 - D(G(z)))].
      The discriminator maximizes this — it wants to correctly identify real and fake.
      The generator minimizes it — it wants to fool D by making D(G(z)) close to 1.
      They are trained alternately, creating an adversarial dynamic that drives the
      generator to produce increasingly realistic outputs.

  - id: q11
    question: What is a Conditional GAN, and how does conditioning change the training objective compared to a standard GAN?
    answer: >
      A Conditional GAN (cGAN) extends the standard GAN by providing both the
      generator and discriminator with extra information y, such as a class label
      or paired input. The generator produces G(z, y) conditioned on y, and the
      discriminator evaluates D(x, y) given both the sample and the condition.
      This allows directed, controlled generation rather than random sampling,
      enabling applications like image-to-image translation and speech enhancement.

  - id: q12
    question: What is mode collapse in GANs, and why does it occur?
    answer: >
      Mode collapse occurs when the generator learns to produce only a narrow
      subset of outputs that consistently fool the discriminator, ignoring large
      portions of the true data distribution. It happens because the generator
      finds a local optimum where a few outputs reliably score well with D,
      and there is no explicit mechanism forcing diversity. This results in
      low-variety generated samples that do not reflect the full distribution.

  - id: q13
    question: What are the forward and reverse processes in a diffusion model, and what is learned in each?
    answer: >
      The forward process gradually adds Gaussian noise to real data over T steps
      until the image becomes pure noise — this is fixed and requires no learning.
      The reverse process is learned: a neural network is trained to predict and
      remove the noise one step at a time, going from x_T back to x_0. Generation
      works by sampling pure noise and repeatedly applying the learned reverse process.

  - id: q14
    question: How does a denoising diffusion model differ architecturally from a VAE in its treatment of latent variables?
    answer: >
      In a VAE, the latent variable z is a compressed lower-dimensional
      representation of the input, learned by an encoder. In a diffusion model,
      the latent variables x_1...x_T have the same dimensionality as the data —
      there is no compression. Instead, the latent variables are simply noisier
      versions of the original data at successive timesteps, produced by a fixed
      noising schedule rather than a learned encoder.

  - id: q15
    question: Why is training diffusion models more stable than training GANs?
    answer: >
      GAN training is unstable because it requires balancing two networks in an
      adversarial game — if the discriminator becomes too strong or too weak,
      training collapses. Diffusion models instead use a straightforward
      supervised denoising objective: the network simply learns to predict and
      remove noise at each timestep. There is no adversarial dynamic, no
      minimax game, and no risk of mode collapse from a competing network.

  - id: q16
    question: What is the difference between an undercomplete and overcomplete autoencoder, and how does each avoid learning the identity function?
    answer: >
      An undercomplete autoencoder has a latent dimension smaller than the input,
      forcing compression and naturally preventing identity mapping. An overcomplete
      autoencoder has a larger latent dimension than the input and could trivially
      learn identity — regularization is required to prevent this, such as sparsity
      constraints in sparse autoencoders, input corruption in denoising autoencoders,
      or dropout applied to hidden units.

  - id: q17
    question: What is variational inference, and why is it needed in the context of VAEs?
    answer: >
      Variational inference is a technique for approximating intractable posterior
      distributions by replacing them with a simpler, parameterized distribution
      and optimizing the parameters to make the approximation as close as possible.
      In VAEs it is needed because the true posterior p_θ(z|x) is intractable —
      computing it requires knowing p_θ(x), which itself requires integrating over
      all z. The approximate posterior q_φ(z|x) modeled by the encoder replaces
      the true posterior, making optimization tractable via the ELBO.