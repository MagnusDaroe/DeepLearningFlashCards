id: transformers
title: Transformers
questions:
  - id: q1
    question: What is self-attention in a transformer?
    answer: >
      Self-attention is a mechanism where each token in a sequence compares itself
      to all other tokens in the same sequence to decide which tokens are most
      relevant for building its contextual representation.

  - id: q2
    question: Why does a transformer need positional encoding?
    answer: >
      A transformer processes tokens in parallel and does not naturally know their
      order, so positional encoding is added to token embeddings to give the model
      information about where each token appears in the sequence.

  - id: q3
    question: What are queries, keys, and values in attention?
    answer: >
      Queries represent what a token is looking for, keys represent what each token
      offers for comparison, and values contain the information that is passed
      forward after attention weights have been computed.

  - id: q4
    question: How does scaled dot-product attention work?
    answer: >
      Scaled dot-product attention compares queries with keys using dot products,
      scales the result by the square root of the key dimension, applies softmax
      to obtain attention weights, and uses those weights to combine the value
      vectors.

  - id: q5
    question: Why is the dot product divided by the square root of the key dimension?
    answer: >
      The division prevents dot products from becoming too large, which would make
      the softmax distribution too sharp and could lead to very small gradients
      during training.

  - id: q6
    question: What is multi-head attention?
    answer: >
      Multi-head attention runs several attention mechanisms in parallel, allowing
      different heads to learn different relationships between tokens before their
      outputs are concatenated and projected.

  - id: q7
    question: Why is multi-head attention useful?
    answer: >
      Multi-head attention is useful because different heads can specialize in
      different patterns, such as local context, grammar, long-range dependencies,
      or special tokens.

  - id: q8
    question: What is the difference between self-attention and cross-attention?
    answer: >
      In self-attention, queries, keys, and values come from the same sequence,
      while in cross-attention, the queries usually come from one sequence and the
      keys and values come from another sequence.

  - id: q9
    question: What is the role of the feed-forward network in a transformer block?
    answer: >
      The feed-forward network processes each token representation after attention
      using linear transformations and a nonlinearity, allowing the model to further
      transform the contextual token features.

  - id: q10
    question: What is the purpose of residual connections in transformers?
    answer: >
      Residual connections add the input of a sub-block to its output, which helps
      preserve information and improves gradient flow when training deep transformer
      models.

  - id: q11
    question: What does Add & Norm mean in a transformer block?
    answer: >
      Add & Norm means that the model first adds a residual connection around a
      sub-block and then applies normalization, typically layer normalization, to
      stabilize training.

  - id: q12
    question: Why are transformers more parallelizable than RNNs?
    answer: >
      Transformers process all tokens at the same time using attention, while RNNs
      process tokens sequentially because each hidden state depends on the previous
      hidden state.

  - id: q13
    question: What is the computational complexity problem of self-attention?
    answer: >
      Full self-attention has quadratic complexity with respect to sequence length
      because every token is compared with every other token, creating an attention
      matrix of size n by n.

  - id: q14
    question: Why can long sequences be difficult for transformers?
    answer: >
      Long sequences are difficult because the cost of full self-attention grows
      quadratically with the number of tokens, leading to high memory and computation
      requirements.

  - id: q15
    question: What is autoregressive generation in a transformer decoder?
    answer: >
      Autoregressive generation means that the decoder predicts one token at a time,
      using previously generated tokens as context for predicting the next token.

  - id: q16
    question: What is the purpose of masked attention in a transformer decoder?
    answer: >
      Masked attention prevents the decoder from looking at future tokens during
      training, ensuring that each prediction only depends on previous tokens.

  - id: q17
    question: How can transformers be applied to images?
    answer: >
      Images can be split into fixed-size patches, each patch can be projected into
      an embedding vector, and the resulting patch embeddings can be processed as
      tokens by a Vision Transformer.

  - id: q18
    question: What is a main difference between CNNs and vision transformers?
    answer: >
      CNNs have a built-in locality bias through convolutional filters, while vision
      transformers use attention over image patches and must learn many spatial
      relationships from data.

  - id: q19
    question: What are common shortcomings of transformers?
    answer: >
      Common shortcomings include quadratic attention complexity, high memory use
      for long sequences, sensitivity to optimization hyperparameters, tendency to
      overfit, and weaker built-in locality compared to CNNs.

  - id: q20
    question: What are possible improvements to standard transformers?
    answer: >
      Possible improvements include efficient attention methods such as Linformer,
      attention-free token mixing such as FNet, and local or shifted-window attention
      such as Swin Transformer.