id: self-supervised-learning
title: Self-Supervised Learning
questions:
  - id: q1
    question: What is the basic premise of self-supervised learning and how does it differ from supervised learning?
    answer: >
      Self-supervised learning learns general feature representations from unlabeled data
      by creating a pretext task that generates its own supervision signal from the data itself.
      Unlike supervised learning, which requires manually labeled data, SSL derives labels
      automatically from the structure of the data, enabling learning from the vast amounts
      of unlabeled data available on the internet.

  - id: q2
    question: What is a pretext task in SSL, and why do we not care about performance on it?
    answer: >
      A pretext task is an invented supervised task whose labels are derived automatically
      from the data itself. We do not care about performance on the pretext task because
      it is only a means to an end — the real goal is to learn good general-purpose feature
      representations that transfer well to downstream tasks. The pretext task is scaffolding,
      not the objective.

  - id: q3
    question: What is the InfoNCE loss and how does it work in contrastive learning?
    answer: >
      InfoNCE is a contrastive loss that trains a model to identify the correct positive
      sample among a set of negatives. The numerator scores the similarity between anchor
      and positive, while the denominator sums similarities across all negative samples.
      Minimizing the negative log of this ratio forces the model to assign higher similarity
      to the true positive than to any negative, learning discriminative representations.

  - id: q4
    question: Why is SimCLR sensitive to batch size, and what does this reveal about how contrastive learning works?
    answer: >
      SimCLR uses all other samples in the batch as negatives. A larger batch provides more
      negatives, making the contrastive task harder and forcing the model to learn more
      discriminative features. With few negatives the task is trivially easy and the model
      learns poor representations. This reveals that the quality of contrastive learning
      is directly tied to the number and diversity of negative examples.

  - id: q5
    question: What is model collapse in joint embedding architectures, and what is the difference between complete and dimensional collapse?
    answer: >
      Model collapse occurs when a model fails to fully utilize its representation space.
      Complete collapse is when the model maps all inputs to the same vector — a trivial
      solution that is easy to detect. Dimensional collapse is subtler — the model uses
      only a subset of the available representation dimensions, ignoring parts of the
      embedding space, making representations less expressive without obviously failing.

  - id: q6
    question: How does SimSiam prevent model collapse without using negative examples?
    answer: >
      SimSiam uses two mechanisms. First, an asymmetric predictor head is added to only
      one branch, breaking the symmetry between the two branches. Second, a stop gradient
      operation prevents gradients from flowing through the target branch. Together these
      prevent the trivial solution where both branches collapse to the same constant output,
      because one branch cannot simply copy the other.

  - id: q7
    question: What is the role of the EMA teacher in BYOL and Data2Vec, and why does it prevent collapse?
    answer: >
      The EMA teacher is a slowly updated copy of the student network, where its weights
      are a running average of the student weights rather than directly trained. This creates
      a stable but constantly evolving target — the student must chase a target that is always
      slightly ahead of it. Because the target is never identical to the student, the trivial
      collapse solution is never a stable fixed point.

  - id: q8
    question: What is the key architectural insight of the Masked Autoencoder (MAE), and why is the encoder only applied to visible patches?
    answer: >
      MAE applies the encoder only to unmasked patches to reduce computational cost and
      increase training efficiency — processing 75-80% fewer tokens through the heavy encoder.
      The mask tokens are only introduced at the decoder stage. This asymmetric design means
      the expensive encoder never sees masked positions, forcing it to learn rich semantic
      representations from partial observations rather than relying on mask token shortcuts.

  - id: q9
    question: Why does MAE mask 75-80% of patches rather than the ~15% used by BERT?
    answer: >
      Images have high spatial redundancy — neighboring pixels are highly correlated, so
      a low masking ratio makes the reconstruction task trivially easy by simply interpolating
      from nearby visible patches. A high masking ratio of 75-80% removes enough context
      that the model cannot rely on local interpolation and must instead develop genuine
      semantic understanding of the image content to reconstruct missing regions.

  - id: q10
    question: Why is the MAE decoder discarded after pretraining, and what is kept?
    answer: >
      The decoder is trained purely for the pretext task of pixel reconstruction, which
      is not useful for downstream tasks. All the valuable learned knowledge — the semantic
      understanding of image content — is encoded in the encoder weights. The decoder is
      scaffolding that forced the encoder to learn good representations. Only the encoder
      is retained for downstream fine-tuning or linear probing.

  - id: q11
    question: What is the fundamental difference between BERT and GPT in terms of architecture and what downstream tasks each is suited for?
    answer: >
      BERT is a bidirectional encoder that attends to both left and right context simultaneously,
      making it powerful for understanding tasks like classification, named entity recognition,
      and question answering. GPT is a unidirectional decoder that only attends to past tokens,
      making it natural for generation tasks like text completion and dialogue. BERT excels
      at tasks requiring full context understanding; GPT at tasks requiring sequential generation.

  - id: q12
    question: What is the difference between context-independent and context-dependent word embeddings, and which models produce each?
    answer: >
      Context-independent embeddings assign a single fixed vector to each word regardless
      of how it is used — Word2Vec produces these, so the word "bank" always has the same
      representation. Context-dependent embeddings produce different vectors for the same
      word depending on surrounding context — BERT produces these, so "bank" gets different
      representations in "river bank" versus "bank account", capturing meaning more accurately.

  - id: q13
    question: What are the two pretraining objectives of BERT and what does each one teach the model?
    answer: >
      Masked Language Modeling masks random tokens and predicts them using full bidirectional
      context, teaching word-level semantics and syntactic relationships. Next Sentence
      Prediction takes two sentences and predicts whether they are consecutive in the original
      text, teaching sentence-level coherence and discourse relationships. Both use cross
      entropy loss and are trained simultaneously, with the total loss being their sum.

  - id: q14
    question: What is the role of the [CLS] token in BERT, and how is it used for downstream classification?
    answer: >
      The [CLS] token is a special token prepended to every input that has no inherent
      meaning itself. During pretraining via next sentence prediction, BERT learns to
      accumulate a summary of the entire input sequence into this token's final hidden state.
      For downstream classification tasks, a linear layer is placed on top of the [CLS]
      output vector C, making it a fixed-length representation of the whole input that
      can be fine-tuned for any classification objective.

  - id: q15
    question: How does Data2Vec differ from MAE in what the student is trained to predict, and why is this beneficial?
    answer: >
      MAE trains the model to reconstruct raw pixel values of masked patches, which wastes
      capacity on low-level details like exact pixel intensities. Data2Vec instead trains
      the student to predict the teacher's top-K internal hidden layer representations —
      high-level semantic features. This means the learning signal is rich and abstract
      from the start, rather than requiring the model to first learn to reconstruct pixels
      before developing semantic understanding.

  - id: q16
    question: What is the skip-gram model in Word2Vec, and how does it differ from CBOW?
    answer: >
      Skip-gram takes a center word as input and predicts surrounding context words,
      learning by asking "given this word, what words appear nearby?" CBOW does the
      opposite — it takes surrounding context words and predicts the center word.
      Skip-gram generally produces better representations for rare words because each
      word gets many training updates as a center word, while CBOW averages context
      which can dilute signals from infrequent words.

  - id: q17
    question: What is Contrastive Predictive Coding (CPC) and how does it differ from Autoregressive Predictive Coding (APC)?
    answer: >
      Both CPC and APC predict future frames from past context in a sequence. APC uses
      a regression loss like L1, directly minimizing the distance between predicted and
      actual future features in continuous space. CPC uses the contrastive InfoNCE loss
      instead — rather than predicting exact future values, it learns to rank the true
      future sample above a set of negative distractors. CPC is generally more powerful
      because exact future prediction in high-dimensional space is much harder than
      contrastive discrimination.

  - id: q18
    question: >
      What is the difference between input space and latent space 
      models in SSL, and give an example of each?
    answer: >
      Input space models predict raw input values directly — for example
      MAE reconstructs pixel values of masked patches, and APC predicts
      raw future audio features. Latent space models instead predict
      abstract representations in an embedding space — for example
      Data2Vec predicts the teacher's hidden layer representations, and
      SimCLR aligns embeddings of augmented views. Latent space models
      generally produce richer learning signals because the targets are
      already semantically meaningful rather than raw low-level data.

  - id: q19
    question: >
      What is MoCo and how does it solve SimCLR's dependency 
      on large batch sizes?
    answer: >
      MoCo (Momentum Contrast) maintains a queue of past encoded
      representations as negatives, decoupling the number of negatives
      from the current batch size. A momentum encoder — updated via EMA
      of the online encoder — encodes the keys stored in the queue,
      ensuring consistency of representations across batches. This means
      MoCo can have thousands of negatives without needing a massive
      batch, making contrastive learning feasible with standard hardware.

  - id: q20
    question: >
      What is the difference between fine-tuning and linear probing 
      as evaluation strategies for SSL representations, and what does 
      each tell you?
    answer: >
      Fine-tuning takes the pretrained encoder and continues training
      all its weights on labeled downstream data, allowing the
      representations to adapt to the specific task. Linear probing
      freezes the encoder completely and only trains a single linear
      classifier on top of the fixed representations. Linear probing
      is a stricter test of representation quality — if even a linear
      classifier performs well on frozen features, the representations
      must already encode semantically meaningful structure without
      any task-specific adaptation.