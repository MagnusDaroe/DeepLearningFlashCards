id: failures-uncertainty
title: Failures, Distribution Shift & Uncertainty
questions:
  - id: q1
    question: What is the difference between aleatoric and epistemic uncertainty, and which one can be reduced by collecting more data?
    answer: >
      Aleatoric uncertainty is irreducible uncertainty inherent in the data itself — caused by sensor noise,
      ambiguous labels, or overlapping class boundaries. No amount of extra data can eliminate it.
      Epistemic uncertainty is model uncertainty caused by insufficient training data or limited model
      capacity. It is reducible: given more relevant data, the model can become more certain. The key
      distinction is that aleatoric uncertainty is a property of the data, while epistemic uncertainty
      is a property of the model's knowledge.

  - id: q2
    question: What is distribution shift, and what are the three main types covered in the lecture?
    answer: >
      Distribution shift refers to the mismatch between the data distribution seen during training and
      the distribution encountered at deployment. The three main types are: (1) Covariate shift, where
      the input distribution p(x) changes but the conditional label distribution p(y|x) stays the same
      (e.g. training on daylight images, deploying at night); (2) Label shift, where the marginal class
      distribution p(y) changes between train and test; (3) Concept drift, where the relationship
      between inputs and labels p(y|x) itself changes over time.

  - id: q3
    question: Why is softmax confidence not a reliable uncertainty estimate in neural networks?
    answer: >
      A neural network's softmax output produces values that sum to 1 and look like probabilities, but
      they are not calibrated confidence scores. Networks are typically overconfident — they assign near
      100% probability to a class even for out-of-distribution inputs that the model has never seen.
      This happens because softmax is a relative scoring function; it always peaks on the most likely
      class regardless of how far the input is from the training distribution. A model presented with
      pure noise will still output a confident class prediction.

  - id: q4
    question: What is calibration in the context of uncertainty estimation, and how is it measured?
    answer: >
      A model is well-calibrated if its predicted confidence scores match empirical accuracy — i.e. among
      all predictions made with 80% confidence, approximately 80% should be correct. Calibration is
      visualised using reliability diagrams, where predicted confidence is plotted against actual accuracy.
      A perfectly calibrated model lies on the diagonal. It is quantified using Expected Calibration Error
      (ECE), which measures the average gap between confidence and accuracy across confidence bins.

  - id: q5
    question: Why can a model be perfectly calibrated but still useless for failure detection?
    answer: >
      Calibration is a marginal property — it only checks whether confidence scores match accuracy on
      average across the dataset. A model that assigns 0% confidence to all incorrect predictions and
      100% to all correct ones would be perfectly calibrated, but so would a model that assigns random
      confidence scores as long as they average out correctly. Calibration says nothing about whether
      the model assigns high uncertainty to the specific inputs it gets wrong. Failure detection requires
      that uncertainty scores discriminate between correct and incorrect predictions, which is measured
      separately using AUROC or AUPR.

  - id: q6
    question: What is the difference between failure detection and OOD detection as evaluation tasks for uncertainty?
    answer: >
      Both tasks frame uncertainty evaluation as a binary detection problem using a threshold on the
      uncertainty score. In failure detection, both positive and negative examples come from the same
      known dataset — the goal is to distinguish correctly classified samples (low uncertainty) from
      incorrectly classified ones (high uncertainty). In OOD detection, the positive class is a
      completely separate out-of-distribution dataset — the goal is to detect inputs that come from a
      different distribution entirely. OOD detection tends to be easier because the distributional gap
      is larger, whereas failure detection requires the model to recognise its own mistakes within
      familiar data.

  - id: q7
    question: What are proper scoring rules, and give two examples used to evaluate probabilistic predictions?
    answer: >
      A proper scoring rule is a loss function that is minimised only when the predicted probability
      distribution matches the true distribution — meaning it incentivises honest probability estimates
      rather than overconfident or underconfident ones. Two examples are: (1) Negative Log-Likelihood
      (NLL), which penalises low predicted probability assigned to the correct class and corresponds to
      cross-entropy loss; (2) the Brier score, which measures the mean squared error between the
      predicted probability vector and the one-hot target. Both reward well-calibrated, sharp predictions.

  - id: q8
    question: How does MC-Dropout approximate Bayesian inference, and what are its limitations?
    answer: >
      MC-Dropout treats dropout — normally used only during training to regularise the network — as
      active at test time as well. By running multiple forward passes with different random dropout masks,
      the model produces a distribution over outputs. The variance across these passes approximates
      epistemic uncertainty. The theoretical justification is that dropout training is equivalent to
      approximate variational inference over a Gaussian process. Limitations include: it requires multiple
      forward passes (computationally expensive), the correspondence to true Bayesian inference is an
      approximation, and it tends to underestimate uncertainty compared to deep ensembles.

  - id: q9
    question: What are deep ensembles, and why are they considered a strong baseline for uncertainty estimation?
    answer: >
      Deep ensembles train multiple neural networks independently from different random initialisations
      (typically 3–10 models). At test time, predictions are aggregated by averaging the softmax outputs.
      Uncertainty is estimated from the variance or entropy of the ensemble's prediction distribution.
      They are considered a strong baseline because: independent training captures diverse modes of the
      posterior; they tend to be well-calibrated; they perform well on both failure detection and OOD
      detection benchmarks. The main drawback is the linear increase in training and inference cost with
      ensemble size.

  - id: q10
    question: What problem do efficient ensembling methods like BatchEnsemble and MIMO solve, and how do they work at a high level?
    answer: >
      They solve the computational cost of deep ensembles, where M models means M times the parameters
      and M forward passes. BatchEnsemble shares most weights across ensemble members and learns small
      per-member rank-1 perturbation matrices, so the cost increase is small. MIMO (Multi-Input
      Multi-Output) trains a single network with multiple input heads and multiple output heads simultaneously,
      encoding multiple ensemble members in one model. Both achieve diversity similar to full ensembles
      at a fraction of the computational cost, though typically with some performance trade-off.

  - id: q11
    question: What is heteroscedastic regression, and how does it capture aleatoric uncertainty?
    answer: >
      In standard regression a model predicts only a mean output. In heteroscedastic regression, the
      model additionally predicts an input-dependent variance σ²(x), meaning the uncertainty is allowed
      to vary across inputs. The model is trained by maximising the Gaussian log-likelihood, which
      balances fitting the mean accurately against appropriately sizing the predicted variance. Regions
      of the input space with noisy or ambiguous labels will result in larger predicted variance, directly
      encoding aleatoric uncertainty. The variance cannot be reduced by more data — it reflects genuine
      noise in those regions.

  - id: q12
    question: What is the core idea behind distance-based uncertainty methods, and what is the feature collapse problem?
    answer: >
      Distance-based methods estimate epistemic uncertainty by measuring how far a test input is from
      the training data in the model's learned feature space — inputs far from any training cluster are
      flagged as uncertain. The feature collapse problem arises when the encoder maps very different
      inputs to the same region of feature space, making distance meaningless as an uncertainty signal.
      For example, an OOD input might accidentally land near in-distribution training features even
      though it is semantically unrelated. Methods like DDU address this by constraining the encoder
      to preserve distances via spectral normalisation and residual connections.

  - id: q13
    question: How does Deep Deterministic Uncertainty (DDU) estimate both epistemic and aleatoric uncertainty from a single forward pass?
    answer: >
      DDU first trains a feature extractor constrained to be bi-Lipschitz — inputs that are far apart
      in pixel space must remain far apart in feature space, preventing feature collapse. After training,
      a Gaussian Mixture Model (GMM) with one component per class is fitted to the training features.
      At test time, the density of the GMM at the test point's feature vector estimates epistemic
      uncertainty — low density means the input is far from training data. Aleatoric uncertainty is
      estimated separately using the entropy of the softmax output. This gives both uncertainty types
      from a single deterministic forward pass, making it far cheaper than ensembles or MC-Dropout.

  - id: q14
    question: What is temperature scaling, and what are its strengths and weaknesses as a calibration method?
    answer: >
      Temperature scaling is a post-hoc calibration method that divides the logits of a trained model
      by a single learned scalar T (the temperature) before applying softmax. T > 1 softens the
      distribution, reducing overconfidence; T < 1 sharpens it. T is optimised on a held-out validation
      set by minimising NLL. Strengths: it is extremely simple, adds no parameters to the model, and
      does not change accuracy. Weaknesses: it only globally rescales confidence and cannot fix
      miscalibration that varies across different input regions or classes. It also does nothing to
      improve OOD or failure detection — it recalibrates but does not make the uncertainty scores
      more discriminative.

  - id: q15
    question: What is conformal prediction, and what statistical guarantee does it provide?
    answer: >
      Conformal prediction is a post-hoc framework that wraps any classifier to produce prediction sets
      — sets of classes — rather than single point predictions. Given a user-specified error rate α,
      conformal prediction guarantees that the true label is contained in the prediction set with
      probability at least 1 − α, under the assumption that calibration and test data are exchangeable
      (i.i.d.). The size of the prediction set adapts to uncertainty: easy inputs get small sets (often
      a single class), while ambiguous or OOD inputs get large sets. Crucially, the coverage guarantee
      is distribution-free and holds without any assumptions about the model.

  - id: q16
    question: What are adversarial examples, and why do they represent a qualitatively different type of failure from distribution shift?
    answer: >
      Adversarial examples are inputs deliberately crafted by an attacker with small, often imperceptible
      perturbations designed to fool a model into a wrong prediction with high confidence. Unlike
      distribution shift — which is an accidental mismatch between training and deployment conditions —
      adversarial attacks are intentional and optimised specifically against the model. A model robust
      to natural distribution shift may still be highly vulnerable to adversarial perturbations because
      adversarial examples exploit the geometry of the decision boundary in directions that standard
      training never covers, making them a distinct threat requiring dedicated defences.

  - id: q17
    question: What are "unknown unknowns" in the context of model failures, and why are they difficult to address?
    answer: >
      Unknown unknowns are failure modes that the model designer did not anticipate and therefore
      did not design the evaluation or training process to handle. Unlike known failure modes (e.g.
      performance on a particular demographic), unknown unknowns cannot be explicitly tested for
      because they are by definition not foreseen. They are difficult to address because standard
      benchmarks and test sets only cover failure modes that were thought of in advance. Discovering
      them typically requires diverse red-teaming, deployment monitoring, or user feedback — and even
      good uncertainty estimates may not flag them if the model is confidently wrong in a systematic way.

  - id: q18
    question: How does the Mahalanobis distance method estimate OOD uncertainty, and how does it differ from a simple Euclidean distance approach?
    answer: >
      The Mahalanobis distance method fits a class-conditional Gaussian to the training features at one
      or more layers of the network. At test time, the uncertainty score is the minimum Mahalanobis
      distance from the test feature vector to any class centroid, where Mahalanobis distance accounts
      for the covariance structure of the training features. This differs from Euclidean distance in
      that it scales distances by the spread of the data along each dimension — a point far from a
      cluster along a high-variance axis is penalised less than one far along a low-variance axis.
      This makes it more sensitive to the actual shape of the training distribution rather than treating
      all directions equally.